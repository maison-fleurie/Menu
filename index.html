<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Menu — Maison Fleurie</title>
  <meta name="description" content="Découvrez la carte de Maison Fleurie — Déguster, Cocktails &amp; Spiritueux à Montpellier." />
  <meta name="theme-color" content="#0a0a0a" />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="fr_FR" />
  <meta property="og:title" content="La Carte — Maison Fleurie" />
  <meta property="og:description" content="Déguster • Cocktails • Spiritueux à Montpellier" />
  <meta property="og:image" content="https://raw.githubusercontent.com/NachoB17/menu-test/main/logo.png" />
  <meta name="twitter:card" content="summary_large_image" />

  <link rel="preload" href="./Polyamine.otf" as="font" type="font/otf" crossorigin />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <style>
    @font-face {
      font-family: 'Polyamine';
      src: url('./Polyamine.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
      font-display: block;
    }

    :root {
      --bg:           #0a0a0a;
      --bg-card:      #111111;
      --bg-elevated:  #161616;
      --bg-nav:       rgba(10,10,10,0.92);
      --green-deep:   #0d1e13;
      --green-mid:    #163621;
      --creme:        #f5f0e8;
      --creme-dim:    rgba(245,240,232,0.55);
      --creme-muted:  rgba(245,240,232,0.32);
      --dore:         #acaf7d;
      --dore-dim:     rgba(172,175,125,0.35);
      --dore-subtle:  rgba(172,175,125,0.12);
      --orange:       #ec5a04;
      --orange-dim:   rgba(236,90,4,0.18);
      --border:       rgba(245,240,232,0.08);
      --border-dore:  rgba(172,175,125,0.22);
      --font-title: 'Polyamine', Georgia, serif;
      --font-body:  'Inter', -apple-system, sans-serif;
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--creme); font-family: var(--font-body); min-height: 100vh; line-height: 1.6; overflow-x: hidden; }

    /* ─── SPLASH ─── */
    #splashScreen {
      position: fixed; inset: 0; background: var(--green-deep);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999; transition: opacity 0.5s var(--ease);
    }
    #splashScreen.fade-out { opacity: 0; pointer-events: none; }
    .splash-logo { width: 300px; max-width: 80vw; filter: drop-shadow(0 8px 40px rgba(172,175,125,0.2)); animation: splashFloat 3s ease-in-out infinite; }
    .splash-loader { width: 32px; height: 32px; margin-top: 2.5rem; border: 2px solid var(--dore-dim); border-top-color: var(--dore); border-radius: 50%; animation: spin 0.9s linear infinite; }
    @keyframes splashFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── HEADER ─── */
    header.header { position: relative; text-align: center; background: var(--green-deep); padding: 3rem 1.5rem 2rem; border-bottom: 1px solid var(--border-dore); }
    .header-eyebrow { font-family: var(--font-body); font-size: 0.6875rem; font-weight: 500; letter-spacing: 0.28em; text-transform: uppercase; color: var(--dore); margin-bottom: 1rem; }
    .header-title { font-family: var(--font-title); font-size: clamp(3rem, 9vw, 5.5rem); font-weight: 400; letter-spacing: 0.06em; line-height: 1; color: var(--creme); margin: 0; }
    .header-divider { width: 40px; height: 1px; background: var(--dore); margin: 1.25rem auto 1rem; opacity: 0.6; }
    .header-subtitle { font-size: 0.75rem; font-weight: 400; letter-spacing: 0.2em; text-transform: uppercase; color: var(--creme-muted); }
    .share-btn { position: absolute; right: 1.25rem; top: 1.25rem; width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border-dore); background: transparent; color: var(--dore); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .share-btn:hover { background: var(--dore-subtle); border-color: var(--dore); }

    /* ─── SEARCH ─── */
    .search-container { max-width: 640px; margin: 1.5rem auto 1rem; padding: 0 1.25rem; }
    .search-row { display: flex; gap: 0.5rem; }
    .search-box { flex: 1; padding: 0.75rem 1rem; font-size: 0.9375rem; font-family: var(--font-body); border-radius: var(--radius-md); border: 1px solid var(--border); background: var(--bg-card); color: var(--creme); transition: border-color 0.2s; outline: none; }
    .search-box::placeholder { color: var(--creme-muted); }
    .search-box:focus { border-color: var(--dore-dim); }
    .clear-btn { border: 1px solid var(--border); background: var(--bg-card); border-radius: var(--radius-md); padding: 0.75rem 1rem; cursor: pointer; font-size: 0.875rem; color: var(--creme-muted); transition: all 0.2s; font-family: var(--font-body); opacity: 0; pointer-events: none; }
    .clear-btn.visible { opacity: 1; pointer-events: auto; }
    .clear-btn:hover { color: var(--creme); border-color: var(--dore-dim); }
    .search-results-info { font-size: 0.8125rem; color: var(--creme-muted); margin: 0.75rem 0; text-align: center; letter-spacing: 0.05em; }

    /* ─── CONTAINER ─── */
    main.container { max-width: 820px; margin: 0 auto 4rem; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-xl); overflow: hidden; }

    /* ─── TAB NAV ─── */
    nav.tab-nav { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.25rem; padding: 1rem 1.25rem; background: var(--bg-nav); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; backdrop-filter: blur(16px); }
    .tab-btn { display: inline-flex; align-items: center; gap: 0.375rem; font-family: var(--font-body); font-size: 0.6875rem; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; padding: 0.5rem 0.875rem; border-radius: var(--radius-sm); border: 1px solid transparent; background: transparent; color: var(--creme-muted); cursor: pointer; transition: all 0.2s var(--ease); }
    .tab-btn:hover { color: var(--creme-dim); border-color: var(--border); }
    .tab-btn[aria-selected="true"] { background: var(--orange); color: #fff; border-color: var(--orange); }
    .tab-btn .ico { display: inline-flex; width: 14px; height: 14px; }
    .tab-btn .ico svg { width: 14px; height: 14px; }

    /* ─── TAB CONTENT ─── */
    .tab-content { display: none; padding: 2rem 1.5rem; min-height: 400px; animation: fadeIn 0.3s var(--ease); }
    .tab-content.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    /* ─── SECTION TITLE ─── */
    .section-title { font-family: var(--font-body); font-size: 0.6875rem; font-weight: 500; letter-spacing: 0.22em; text-transform: uppercase; color: var(--dore); margin: 2rem 0 1rem; padding-bottom: 0.625rem; border-bottom: 1px solid var(--border); position: relative; }
    .section-title:first-child { margin-top: 0; }
    .section-title::after { content: ''; position: absolute; bottom: -1px; left: 0; width: 24px; height: 1px; background: var(--dore); }

    /* ─── MENU ITEM ─── */
    .menu-item { display: flex; align-items: baseline; justify-content: space-between; gap: 1rem; padding: 0.875rem 0; border-bottom: 1px solid var(--border); position: relative; }
    .menu-item:last-child { border-bottom: none; }
    .menu-item::before { content: ''; position: absolute; left: -0.5rem; top: 0; bottom: 0; width: 2px; background: var(--dore); opacity: 0; transition: opacity 0.2s; border-radius: 1px; }
    .menu-item:hover::before { opacity: 1; }
    .item-info { flex: 1; min-width: 0; }
    .item-name-row { display: flex; align-items: center; flex-wrap: wrap; gap: 0.5rem; }
    .item-name { font-family: var(--font-title); font-size: 1.125rem; font-weight: 400; color: var(--creme); line-height: 1.3; letter-spacing: 0.02em; }
    .item-description { font-size: 0.8125rem; color: var(--creme-muted); margin-top: 0.2rem; line-height: 1.5; font-style: italic; }
    .item-price { font-family: var(--font-body); font-size: 0.875rem; font-weight: 500; color: var(--dore); white-space: nowrap; flex-shrink: 0; letter-spacing: 0.03em; }



    /* ─── SKELETON ─── */
    .skeleton { display: block; height: 14px; background: linear-gradient(90deg, var(--bg-elevated) 25%, var(--bg-nav) 50%, var(--bg-elevated) 75%); background-size: 400px 100%; border-radius: var(--radius-sm); animation: shimmer 1.6s infinite; }
    .skeleton.big { height: 20px; }
    @keyframes shimmer { from{background-position:-400px 0} to{background-position:400px 0} }

    /* ─── EMPTY STATE ─── */
    .empty-state { text-align: center; padding: 3rem 1.5rem; color: var(--creme-muted); }
    .empty-state h3 { font-family: var(--font-title); font-size: 1.25rem; font-weight: 400; color: var(--creme-dim); margin-bottom: 0.5rem; letter-spacing: 0.03em; }

    /* ─── STICKY HEADER ─── */
    .sticky-section-header { position: fixed; top: 0; left: 0; right: 0; z-index: 50; background: rgba(13,30,19,0.96); backdrop-filter: blur(12px); color: var(--dore); padding: 0.5rem 1.5rem; text-align: center; font-size: 0.6875rem; font-weight: 500; letter-spacing: 0.22em; text-transform: uppercase; border-bottom: 1px solid var(--border-dore); opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .sticky-section-header.visible { opacity: 1; }

    /* ─── BACK TO TOP ─── */
    .back-to-top { position: fixed; bottom: 1.5rem; right: 1.5rem; width: 44px; height: 44px; border-radius: 50%; background: var(--green-mid); border: 1px solid var(--border-dore); color: var(--dore); cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 100; opacity: 0; pointer-events: none; transition: all 0.3s; }
    .back-to-top.visible { opacity: 1; pointer-events: auto; }
    .back-to-top:hover { background: var(--green-deep); transform: translateY(-2px); }
    .back-to-top svg { width: 20px; height: 20px; }

    /* ─── FOOTER ─── */
    footer.footer { text-align: center; padding: 2rem 1.5rem; color: var(--creme-muted); font-size: 0.8125rem; border-top: 1px solid var(--border); line-height: 1.8; }
    .footer-contact { display: inline-flex; align-items: center; gap: 0.5rem; margin-top: 1rem; padding: 0.625rem 1.25rem; background: transparent; border: 1px solid var(--border-dore); color: var(--dore); text-decoration: none; border-radius: var(--radius-md); font-size: 0.75rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; transition: all 0.2s; }
    .footer-contact:hover { background: var(--dore-subtle); }
    .footer-contact svg { width: 14px; height: 14px; }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 768px) {
      header.header { padding: 2.5rem 1rem 1.5rem; }
      main.container { margin: 0 0.75rem 3rem; border-radius: var(--radius-lg); }
      .tab-content { padding: 1.5rem 1rem; }
      .tab-btn { font-size: 0.625rem; padding: 0.4rem 0.625rem; }
    }
    @media (max-width: 480px) { .header-title { font-size: 2.75rem; } }
  </style>
</head>
<body>

  <div id="splashScreen">
    <img src="./logo_chargement.png" alt="Maison Fleurie" class="splash-logo" />
    <div class="splash-loader"></div>
  </div>

  <header class="header" role="banner">
    <p class="header-eyebrow">Maison Fleurie · Montpellier</p>
    <h1 class="header-title">La Carte</h1>
    <div class="header-divider"></div>
    <p class="header-subtitle">Table des Mets &nbsp;·&nbsp; Cocktails &nbsp;·&nbsp; Spiritueux</p>
    <button id="btnShare" class="share-btn" aria-label="Partager">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.02-4.11A3 3 0 1 0 15 4.91c0 .24.04.47.09.7L8.07 9.72A3 3 0 1 0 6 12.91c.82 0 1.56-.33 2.09-.87l7.02 4.11c-.05.21-.08.43-.08.66a3 3 0 1 0 3-3Z"/>
      </svg>
    </button>
  </header>

  <div id="stickySectionHeader" class="sticky-section-header"></div>
  <noscript><p style="text-align:center;padding:2rem;color:#f5f0e8">JavaScript requis.</p></noscript>

  <div class="search-container">
    <div class="search-row">
      <input id="searchBox" class="search-box" type="search" placeholder="Rechercher un plat, cocktail, digestif…" autocomplete="off" />
      <button id="clearSearch" class="clear-btn" aria-label="Effacer">✕</button>
    </div>
    <div id="searchInfo" class="search-results-info" style="display:none"></div>
  </div>

  <main id="main" class="container" role="main">
    <nav class="tab-nav" role="tablist">
      <button class="tab-btn" role="tab" aria-selected="true"  data-tab="deguster">
        <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M7 3v10M11 3v10M5 7h8M16 4h3v9a3 3 0 0 1-3 3h-3"/></svg></span><span>Déguster</span>
      </button>
      <button class="tab-btn" role="tab" aria-selected="false" data-tab="cocktails">
        <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 4h18l-7 7v7h-4v-7z"/></svg></span><span>Cocktails</span>
      </button>
      <button class="tab-btn" role="tab" aria-selected="false" data-tab="chaudes">
        <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 8h12a4 4 0 0 1 0 8H4z"/><path d="M7 4c0 2 2 2 2 4s-2 2-2 4"/></svg></span><span>Chaudes</span>
      </button>
      <button class="tab-btn" role="tab" aria-selected="false" data-tab="bieres">
        <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M7 8h8v12H7z"/><path d="M15 10h2a3 3 0 0 1 0 6h-2"/></svg></span><span>Bières</span>
      </button>
      <button class="tab-btn" role="tab" aria-selected="false" data-tab="softs">
        <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M7 7h10l-2 13H9z"/><path d="M9 11h8"/></svg></span><span>Softs</span>
      </button>
      <button class="tab-btn" role="tab" aria-selected="false" data-tab="digestifs">
        <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M5 3h14M8 3l-1 8h10l-1-8M10 11v8M14 11v8M8 19h8"/></svg></span><span>Digestifs</span>
      </button>
    </nav>

    <section id="panel-deguster"  class="tab-content active"></section>
    <section id="panel-cocktails" class="tab-content"></section>
    <section id="panel-chaudes"   class="tab-content"></section>
    <section id="panel-bieres"    class="tab-content"></section>
    <section id="panel-softs"     class="tab-content"></section>
    <section id="panel-digestifs" class="tab-content"></section>

    <div id="errorContainer" class="empty-state" style="display:none">
      <h3>Impossible de charger la carte</h3>
      <p>Vérifiez votre connexion et réessayez.</p>
      <button id="retryBtn" style="margin:1rem auto 0;padding:0.625rem 1.25rem;border-radius:8px;font-size:0.75rem;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;border:1px solid var(--border-dore);background:transparent;color:var(--dore);font-family:var(--font-body);display:block;">Réessayer</button>
    </div>
  </main>

  <footer class="footer">
    Prix nets TTC, service compris<br>
    Pour les allergènes, renseignez-vous auprès de notre équipe
    <br>
    <a href="mailto:contact@maison-fleurie.com" class="footer-contact">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>

  <button id="backToTop" class="back-to-top" aria-label="Retour en haut">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
  </button>

<script>
const SUPABASE_URL  = 'https://yctaoyxlfzmlzkwwjeti.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InljdGFveXhsZnptbHprd3dqZXRpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2MDQyNzAsImV4cCI6MjA4NzE4MDI3MH0.VeufqlzIrDobaOZRmz-xt2Zda-6QVz0T2CFy_GvIdPw';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

const CACHE_KEY = 'mf-menu-sb-v9';
const CACHE_AT  = 'mf-menu-sb-at9';
const CACHE_TTL = 15 * 60 * 1000;

let allMenuData = [];
let currentTab = 'deguster', isSearching = false, searchTimeout;

const qs  = s => document.querySelector(s);
const qsa = s => Array.from(document.querySelectorAll(s));
const norm = (s='') => String(s).normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim();

const getPriceVal = (raw='') => {
  const m = String(raw).match(/(\d+(?:[.,]\d+)?)/g);
  if (!m) return Infinity;
  return Math.min(...m.map(n=>parseFloat(n.replace(',','.'))).filter(isFinite));
};
const byPrice = (a,b) => {
  const pa=getPriceVal(a.prix), pb=getPriceVal(b.prix);
  if (isFinite(pa)&&isFinite(pb)&&pa!==pb) return pa-pb;
  if (isFinite(pa)&&!isFinite(pb)) return -1;
  if (!isFinite(pa)&&isFinite(pb)) return 1;
  return (a.nom||'').localeCompare(b.nom||'','fr',{sensitivity:'base'});
};

const TAB_ORDER = ['deguster','cocktails','chaudes','bieres','softs','digestifs'];


/* ── RENDER ── */
const DEGUSTER_ORDER=['veggie','terre','mer','fromages','charcuterie','dessert','desserts'];

const itemHTML = item => `
  <div class="menu-item">
    <div class="item-info">
      <div class="item-name-row">
        <span class="item-name">${item.nom||''}</span>
      </div>
      ${item.description ? `<div class="item-description">${item.description}</div>` : ''}
    </div>
    <div class="item-price">${item.prix||''}</div>
  </div>`;

const renderSections = (items, tab) => {
  const g = new Map();
  items.forEach(it => { const k=it.section||'Autres'; if(!g.has(k))g.set(k,[]); g.get(k).push(it); });
  return [...g.entries()].sort((a,b) => {
    if(norm(tab)!=='deguster') return a[0].localeCompare(b[0],'fr');
    const ia=DEGUSTER_ORDER.findIndex(s=>norm(a[0]).includes(s));
    const ib=DEGUSTER_ORDER.findIndex(s=>norm(b[0]).includes(s));
    return (ia===-1?999:ia)-(ib===-1?999:ib);
  }).map(([sec,its]) =>
    `<h2 class="section-title" data-section="${sec}">${sec}</h2>` + its.sort(byPrice).map(itemHTML).join('')
  ).join('');
};

const showSkeleton = el => {
  el.innerHTML=`
    <div class="menu-item"><span class="skeleton big" style="width:55%"></span><span class="skeleton" style="width:60px"></span></div>
    <div class="menu-item"><span class="skeleton big" style="width:40%"></span><span class="skeleton" style="width:60px"></span></div>
    <div class="menu-item"><span class="skeleton big" style="width:65%"></span><span class="skeleton" style="width:60px"></span></div>`;
};

const renderTab = tab => {
  const el=qs(`#panel-${tab}`); if(!el)return;
  if(!allMenuData.length){showSkeleton(el);return;}
  const items=allMenuData.filter(i=>i.onglet===tab);
  if(!items.length){el.innerHTML=`<div class="empty-state"><h3>Section vide</h3></div>`;return;}
  el.innerHTML=renderSections(items,tab);
};

/* ── DATA ── */
const loadCache = () => {
  try{const at=Number(localStorage.getItem(CACHE_AT)||0);if(Date.now()-at<CACHE_TTL){const c=JSON.parse(localStorage.getItem(CACHE_KEY)||'[]');if(Array.isArray(c)&&c.length)return c;}}catch{}return null;
};
const saveCache = rows => { try{localStorage.setItem(CACHE_KEY,JSON.stringify(rows));localStorage.setItem(CACHE_AT,String(Date.now()));}catch{} };

const setData = rows => {
  allMenuData = rows.filter(i=>i.actif);
  ['deguster','cocktails','chaudes','bieres','softs','digestifs'].forEach(t=>renderTab(t));
  hideSplash();
};

const fetchData = async () => {
  ['deguster','cocktails','chaudes','bieres','softs','digestifs'].forEach(t=>{const el=qs(`#panel-${t}`);if(el)showSkeleton(el);});
  const cached=loadCache();
  if(cached){setData(cached);return;}
  try{
    const{data,error}=await sb.from('menu_items').select('*').eq('actif',true).order('sort_order',{ascending:true});
    if(error)throw error;
    saveCache(data);setData(data);
  }catch(e){console.error(e);qs('#errorContainer').style.display='block';}
};

/* ── TABS ── */
const setActiveTab = tab => {
  currentTab=tab;
  qsa('.tab-btn').forEach(b=>b.setAttribute('aria-selected',b.dataset.tab===tab?'true':'false'));
  qsa('.tab-content').forEach(p=>p.classList.remove('active'));
  qs(`#panel-${tab}`)?.classList.add('active');
  if(!isSearching)renderTab(tab);
};

/* ── SEARCH ── */
const performSearch = query => {
  isSearching=true;
  const q=norm(query);
  const res=allMenuData.filter(i=>norm(i.nom).includes(q)||norm(i.description||'').includes(q)||norm(i.section||'').includes(q));
  const info=qs('#searchInfo');info.style.display='block';info.textContent=`${res.length} résultat(s) pour "${query}"`;
  const ap=qs('.tab-content.active'); if(!ap)return;
  if(!res.length){ap.innerHTML=`<div class="empty-state"><h3>Aucun résultat</h3></div>`;return;}
  ap.innerHTML=renderSections(res,currentTab);
};
const clearSearch = () => {
  isSearching=false;qs('#searchBox').value='';qs('#searchInfo').style.display='none';renderTab(currentTab);
};

/* ── SCROLL ── */
const setupScroll = () => {
  const sh=qs('#stickySectionHeader'),bt=qs('#backToTop');
  bt?.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));
  window.addEventListener('scroll',()=>{
    if(window.scrollY>300)bt?.classList.add('visible');else bt?.classList.remove('visible');
    const ap=qs('.tab-content.active'); if(!ap||!sh)return;
    let cur=null;
    ap.querySelectorAll('.section-title').forEach(t=>{if(t.getBoundingClientRect().top<=80)cur=t.dataset.section||t.textContent;});
    if(cur){sh.textContent=cur;sh.classList.add('visible');}else sh.classList.remove('visible');
  },{passive:true});
};

/* ── SPLASH ── */
window._splashStart=Date.now();
let _splashHidden=false;
const hideSplash = () => {
  if(_splashHidden)return; _splashHidden=true;
  const s=qs('#splashScreen');
  const delay=Math.max(0,200-(Date.now()-window._splashStart));
  setTimeout(()=>{s?.classList.add('fade-out');setTimeout(()=>{if(s)s.style.display='none';},500);},delay);
};
window.addEventListener('load',()=>setTimeout(hideSplash,800));

/* ── INIT ── */
document.addEventListener('DOMContentLoaded',()=>{
  qsa('.tab-btn').forEach(b=>{
    b.addEventListener('click',e=>{e.preventDefault();setActiveTab(b.dataset.tab);});
    b.addEventListener('keydown',e=>{
      const tabs=qsa('.tab-btn'),idx=tabs.findIndex(t=>t.getAttribute('aria-selected')==='true');
      if(e.key==='ArrowRight'){e.preventDefault();const n=tabs[(idx+1)%tabs.length];n.focus();setActiveTab(n.dataset.tab);}
      if(e.key==='ArrowLeft') {e.preventDefault();const n=tabs[(idx-1+tabs.length)%tabs.length];n.focus();setActiveTab(n.dataset.tab);}
    });
  });
  const sb2=qs('#searchBox'),cb=qs('#clearSearch');
  sb2.addEventListener('focus',()=>cb.classList.add('visible'));
  sb2.addEventListener('blur', ()=>{setTimeout(()=>{if(!sb2.value.trim())cb.classList.remove('visible');},200);});
  sb2.addEventListener('input',e=>{
    clearTimeout(searchTimeout);const q=e.target.value.trim();
    if(q)cb.classList.add('visible');
    if(!q){clearSearch();cb.classList.remove('visible');return;}
    searchTimeout=setTimeout(()=>performSearch(q),250);
  });
  cb.addEventListener('click',()=>{clearSearch();cb.classList.remove('visible');sb2.blur();});
  qs('#retryBtn')?.addEventListener('click',fetchData);
  qs('#btnShare')?.addEventListener('click',async()=>{
    const url=location.href;
    if(navigator.share)try{await navigator.share({title:document.title,url});}catch{}
    else try{await navigator.clipboard.writeText(url);}catch{}
  });
  setupScroll();
  fetchData();
});
</script>
</body>
</html>
