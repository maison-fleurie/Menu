<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Menu — Maison Fleurie</title>
  <meta name="description" content="Découvrez la carte de Maison Fleurie — Déguster, Cocktails & Vins à Montpellier." />
  <meta name="theme-color" content="#0a0a0a" />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="fr_FR" />
  <meta property="og:title" content="La Carte — Maison Fleurie" />
  <meta property="og:description" content="Déguster • Cocktails • Vins à Montpellier" />
  <meta property="og:image" content="https://raw.githubusercontent.com/NachoB17/menu-test/main/logo.png" />
  <meta name="twitter:card" content="summary_large_image" />

  <!-- Préchargement Polyamine pour éviter le flash FOUC -->
  <link rel="preload" href="./Polyamine.otf" as="font" type="font/otf" crossorigin />

  <!-- Inter pour le corps -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <style>
    /* ─── POLYAMINE — fichier local dans le repo ─── */
    @font-face {
      font-family: 'Polyamine';
      src: url('./Polyamine.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
      font-display: block;
    }

    /* ─── DESIGN TOKENS ─── */
    :root {
      --bg:           #0a0a0a;
      --bg-card:      #111111;
      --bg-elevated:  #161616;
      --bg-nav:       rgba(10,10,10,0.92);
      --green-deep:   #0d1e13;
      --green-mid:    #163621;
      --creme:        #f5f0e8;
      --creme-dim:    rgba(245,240,232,0.55);
      --creme-muted:  rgba(245,240,232,0.32);
      --dore:         #acaf7d;
      --dore-dim:     rgba(172,175,125,0.35);
      --dore-subtle:  rgba(172,175,125,0.12);
      --orange:       #ec5a04;
      --orange-dim:   rgba(236,90,4,0.18);
      --border:       rgba(245,240,232,0.08);
      --border-dore:  rgba(172,175,125,0.22);

      /* Polyamine pour tous les titres, Inter pour le corps */
      --font-title: 'Polyamine', Georgia, serif;
      --font-body:  'Inter', -apple-system, sans-serif;

      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;

      --ease: cubic-bezier(0.16, 1, 0.3, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      color: var(--creme);
      font-family: var(--font-body);
      min-height: 100vh;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ─── SPLASH ─── */
    #splashScreen {
      position: fixed; inset: 0;
      background: var(--green-deep);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s var(--ease);
    }
    #splashScreen.fade-out { opacity: 0; pointer-events: none; }
    .splash-logo {
      width: 300px; max-width: 80vw;
      filter: drop-shadow(0 8px 40px rgba(172,175,125,0.2));
      animation: splashFloat 3s ease-in-out infinite;
    }
    .splash-loader {
      width: 32px; height: 32px;
      margin-top: 2.5rem;
      border: 2px solid var(--dore-dim);
      border-top-color: var(--dore);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes splashFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── HEADER ─── */
    header.header {
      position: relative;
      text-align: center;
      background: var(--green-deep);
      padding: 3rem 1.5rem 2rem;
      border-bottom: 1px solid var(--border-dore);
    }
    .header-eyebrow {
      font-family: var(--font-body);
      font-size: 0.6875rem; font-weight: 500;
      letter-spacing: 0.28em; text-transform: uppercase;
      color: var(--dore); margin-bottom: 1rem;
    }
    .header-title {
      font-family: var(--font-title);
      font-size: clamp(3rem, 9vw, 5.5rem);
      font-weight: 400;
      letter-spacing: 0.06em; line-height: 1;
      color: var(--creme); margin: 0;
    }
    .header-divider {
      width: 40px; height: 1px;
      background: var(--dore);
      margin: 1.25rem auto 1rem; opacity: 0.6;
    }
    .header-subtitle {
      font-size: 0.75rem; font-weight: 400;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--creme-muted);
    }
    .share-btn {
      position: absolute; right: 1.25rem; top: 1.25rem;
      width: 40px; height: 40px; border-radius: 50%;
      border: 1px solid var(--border-dore); background: transparent;
      color: var(--dore); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .share-btn:hover { background: var(--dore-subtle); border-color: var(--dore); }

    /* ─── SEARCH ─── */
    .search-container { max-width: 640px; margin: 1.5rem auto 1rem; padding: 0 1.25rem; }
    .search-row { display: flex; gap: 0.5rem; }
    .search-box {
      flex: 1; padding: 0.75rem 1rem; font-size: 0.9375rem;
      font-family: var(--font-body); border-radius: var(--radius-md);
      border: 1px solid var(--border); background: var(--bg-card);
      color: var(--creme); transition: border-color 0.2s; outline: none;
    }
    .search-box::placeholder { color: var(--creme-muted); }
    .search-box:focus { border-color: var(--dore-dim); }
    .clear-btn {
      border: 1px solid var(--border); background: var(--bg-card);
      border-radius: var(--radius-md); padding: 0.75rem 1rem;
      cursor: pointer; font-size: 0.875rem; color: var(--creme-muted);
      transition: all 0.2s; font-family: var(--font-body);
      opacity: 0; pointer-events: none;
    }
    .clear-btn.visible { opacity: 1; pointer-events: auto; }
    .clear-btn:hover { color: var(--creme); border-color: var(--dore-dim); }
    .search-results-info {
      font-size: 0.8125rem; color: var(--creme-muted);
      margin: 0.75rem 0; text-align: center; letter-spacing: 0.05em;
    }

    /* ─── CONTAINER ─── */
    main.container {
      max-width: 820px; margin: 0 auto 4rem;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-xl); overflow: hidden;
    }

    /* ─── TAB NAV ─── */
    nav.tab-nav {
      display: flex; flex-wrap: wrap; justify-content: center;
      gap: 0.25rem; padding: 1rem 1.25rem;
      background: var(--bg-nav); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 10; backdrop-filter: blur(16px);
    }
    .tab-btn {
      display: inline-flex; align-items: center; gap: 0.375rem;
      font-family: var(--font-body); font-size: 0.6875rem; font-weight: 500;
      letter-spacing: 0.18em; text-transform: uppercase;
      padding: 0.5rem 0.875rem; border-radius: var(--radius-sm);
      border: 1px solid transparent; background: transparent;
      color: var(--creme-muted); cursor: pointer; transition: all 0.2s var(--ease);
    }
    .tab-btn:hover { color: var(--creme-dim); border-color: var(--border); }
    .tab-btn[aria-selected="true"] { background: var(--orange); color: #fff; border-color: var(--orange); }
    .tab-btn .ico { display: inline-flex; width: 14px; height: 14px; }
    .tab-btn .ico svg { width: 14px; height: 14px; }

    /* ─── TAB CONTENT ─── */
    .tab-content { display: none; padding: 2rem 1.5rem; min-height: 400px; animation: fadeIn 0.3s var(--ease); }
    .tab-content.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    /* ─── SECTION TITLE ─── */
    .section-title {
      font-family: var(--font-body); font-size: 0.6875rem; font-weight: 500;
      letter-spacing: 0.22em; text-transform: uppercase; color: var(--dore);
      margin: 2rem 0 1rem; padding-bottom: 0.625rem;
      border-bottom: 1px solid var(--border); position: relative;
    }
    .section-title:first-child { margin-top: 0; }
    .section-title::after {
      content: ''; position: absolute; bottom: -1px; left: 0;
      width: 24px; height: 1px; background: var(--dore);
    }

    /* ─── MENU ITEM ─── */
    .menu-item {
      display: flex; align-items: baseline; justify-content: space-between;
      gap: 1rem; padding: 0.875rem 0; border-bottom: 1px solid var(--border); position: relative;
    }
    .menu-item:last-child { border-bottom: none; }
    .menu-item::before {
      content: ''; position: absolute; left: -0.5rem; top: 0; bottom: 0; width: 2px;
      background: var(--dore); opacity: 0; transition: opacity 0.2s; border-radius: 1px;
    }
    .menu-item:hover::before { opacity: 1; }
    .item-info { flex: 1; min-width: 0; }
    .item-name {
      font-family: var(--font-title); font-size: 1.125rem; font-weight: 400;
      color: var(--creme); line-height: 1.3; letter-spacing: 0.02em;
    }
    .item-description {
      font-size: 0.8125rem; color: var(--creme-muted);
      margin-top: 0.2rem; line-height: 1.5; font-style: italic;
    }
    .item-price {
      font-family: var(--font-body); font-size: 0.875rem; font-weight: 500;
      color: var(--dore); white-space: nowrap; flex-shrink: 0; letter-spacing: 0.03em;
    }

    /* ─── EN CE MOMENT ─── */
    .now-header { text-align: center; margin-bottom: 2rem; }
    .now-eyebrow { font-size: 0.6875rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--orange); font-weight: 500; }
    .now-title {
      font-family: var(--font-title); font-size: 2.5rem; font-weight: 400;
      color: var(--creme); margin-top: 0.5rem; letter-spacing: 0.04em;
    }

    /* ─── SKELETON ─── */
    .skeleton {
      display: block; height: 14px;
      background: linear-gradient(90deg, var(--bg-elevated) 25%, var(--bg-nav) 50%, var(--bg-elevated) 75%);
      background-size: 400px 100%; border-radius: var(--radius-sm); animation: shimmer 1.6s infinite;
    }
    .skeleton.big { height: 20px; }
    @keyframes shimmer { from{background-position:-400px 0} to{background-position:400px 0} }

    /* ─── WINE TREE ─── */
    .wine-tree { padding: 0; }
    .wine-tree-header { text-align: center; margin-bottom: 2rem; }
    .wine-tree-eyebrow { font-size: 0.6875rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--dore); font-weight: 500; }
    .wine-tree-title { font-family: var(--font-title); font-size: 2.25rem; font-weight: 400; color: var(--creme); margin-top: 0.5rem; letter-spacing: 0.04em; }
    .progress-bar { display: flex; gap: 4px; margin-bottom: 0.5rem; }
    .progress-step { flex: 1; height: 2px; background: var(--border); border-radius: 2px; transition: background 0.3s; }
    .progress-step.active { background: var(--dore); }
    .progress-info { font-size: 0.6875rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--creme-muted); text-align: center; margin-bottom: 2rem; }
    .question-title { font-family: var(--font-title); font-size: 1.5rem; font-weight: 400; color: var(--creme); text-align: center; margin-bottom: 1.25rem; letter-spacing: 0.03em; }
    .wine-options { display: flex; flex-direction: column; gap: 0.625rem; }
    .wine-option {
      width: 100%; padding: 1rem 1.25rem; text-align: left;
      border: 1px solid var(--border); border-radius: var(--radius-md);
      background: var(--bg-elevated); color: var(--creme); cursor: pointer;
      display: flex; align-items: center; justify-content: space-between;
      font-family: var(--font-body); transition: all 0.2s var(--ease);
    }
    .wine-option:hover { border-color: var(--dore-dim); background: var(--bg-nav); transform: translateX(3px); }
    .wine-option-content { flex: 1; }
    .wine-option-label { font-size: 0.9375rem; font-weight: 500; color: var(--creme); display: flex; align-items: center; gap: 0.5rem; }
    .wine-option-desc { font-size: 0.8125rem; color: var(--creme-muted); margin-top: 0.25rem; font-style: italic; }
    .wine-color-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: var(--dot-color, var(--dore)); border: 1px solid rgba(255,255,255,0.15); }
    .chevron-icon { width: 16px; height: 16px; color: var(--dore); transition: transform 0.2s; flex-shrink: 0; }
    .wine-option:hover .chevron-icon { transform: translateX(4px); }
    .wine-nav-btns { display: flex; flex-wrap: wrap; gap: 0.625rem; margin-top: 2rem; justify-content: center; }
    .wine-btn {
      padding: 0.625rem 1.25rem; border-radius: var(--radius-md);
      font-size: 0.75rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase;
      cursor: pointer; display: flex; align-items: center; gap: 0.375rem;
      font-family: var(--font-body); transition: all 0.2s; border: 1px solid var(--border);
    }
    .wine-btn-back { background: transparent; color: var(--creme-dim); }
    .wine-btn-back:hover { border-color: var(--border-dore); color: var(--creme); }
    .wine-btn-primary { background: var(--orange); border-color: var(--orange); color: #fff; }
    .wine-btn-primary:hover { opacity: 0.9; }
    .wine-btn-secondary { background: transparent; border-color: var(--border-dore); color: var(--dore); }
    .wine-btn-secondary:hover { background: var(--dore-subtle); }

    /* ─── WINE CARDS ─── */
    .reco-header { text-align: center; margin-bottom: 1.5rem; }
    .reco-eyebrow { font-size: 0.6875rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--orange); font-weight: 500; }
    .reco-title { font-family: var(--font-title); font-size: 2.25rem; font-weight: 400; color: var(--creme); margin-top: 0.5rem; letter-spacing: 0.04em; }
    .wine-card { border: 1px solid var(--border); border-radius: var(--radius-md); padding: 1.125rem 1.25rem; margin-bottom: 0.625rem; background: var(--bg-elevated); transition: all 0.2s var(--ease); }
    .wine-card:hover { border-color: var(--border-dore); transform: translateY(-2px); }
    .wine-card-badges { display: flex; flex-wrap: wrap; gap: 0.375rem; margin-bottom: 0.625rem; }
    .wine-badge { font-size: 0.625rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; border-radius: 2px; padding: 0.25rem 0.625rem; border: 1px solid transparent; }
    .wine-badge-glass { background: var(--dore-subtle); color: var(--dore); border-color: var(--border-dore); }
    .wine-badge-reco { background: var(--orange-dim); color: var(--orange); border-color: rgba(236,90,4,0.3); }
    .wine-badge-local { background: rgba(22,54,33,0.6); color: #6db87a; border-color: rgba(109,184,122,0.25); }
    .wine-card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; margin-bottom: 0.375rem; }
    .wine-card-name { font-family: var(--font-title); font-size: 1.0625rem; font-weight: 400; color: var(--creme); flex: 1; line-height: 1.3; letter-spacing: 0.02em; }
    .wine-card-price { font-size: 0.875rem; font-weight: 500; color: var(--dore); white-space: nowrap; flex-shrink: 0; }
    .wine-card-region { font-size: 0.8125rem; color: var(--creme-muted); font-weight: 400; margin-bottom: 0.125rem; }
    .wine-card-grapes { font-size: 0.75rem; color: var(--creme-muted); font-style: italic; line-height: 1.5; }

    /* ─── EMPTY STATE ─── */
    .empty-state { text-align: center; padding: 3rem 1.5rem; color: var(--creme-muted); }
    .empty-state h3 { font-family: var(--font-title); font-size: 1.25rem; font-weight: 400; color: var(--creme-dim); margin-bottom: 0.5rem; letter-spacing: 0.03em; }

    /* ─── STICKY HEADER ─── */
    .sticky-section-header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 50;
      background: rgba(13,30,19,0.96); backdrop-filter: blur(12px); color: var(--dore);
      padding: 0.5rem 1.5rem; text-align: center; font-size: 0.6875rem; font-weight: 500;
      letter-spacing: 0.22em; text-transform: uppercase; border-bottom: 1px solid var(--border-dore);
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .sticky-section-header.visible { opacity: 1; }

    /* ─── BACK TO TOP ─── */
    .back-to-top {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--green-mid); border: 1px solid var(--border-dore); color: var(--dore);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      z-index: 100; opacity: 0; pointer-events: none; transition: all 0.3s;
    }
    .back-to-top.visible { opacity: 1; pointer-events: auto; }
    .back-to-top:hover { background: var(--green-deep); transform: translateY(-2px); }
    .back-to-top svg { width: 20px; height: 20px; }

    /* ─── FOOTER ─── */
    footer.footer {
      text-align: center; padding: 2rem 1.5rem; color: var(--creme-muted);
      font-size: 0.8125rem; border-top: 1px solid var(--border); line-height: 1.8;
    }
    .footer-contact {
      display: inline-flex; align-items: center; gap: 0.5rem; margin-top: 1rem;
      padding: 0.625rem 1.25rem; background: transparent; border: 1px solid var(--border-dore);
      color: var(--dore); text-decoration: none; border-radius: var(--radius-md);
      font-size: 0.75rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; transition: all 0.2s;
    }
    .footer-contact:hover { background: var(--dore-subtle); }
    .footer-contact svg { width: 14px; height: 14px; }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 768px) {
      header.header { padding: 2.5rem 1rem 1.5rem; }
      main.container { margin: 0 0.75rem 3rem; border-radius: var(--radius-lg); }
      .tab-content { padding: 1.5rem 1rem; }
      .tab-btn { font-size: 0.625rem; padding: 0.4rem 0.625rem; }
      .wine-nav-btns { flex-direction: column; }
      .wine-btn { width: 100%; justify-content: center; }
      .wine-card-header { flex-direction: column; gap: 0.375rem; }
    }
    @media (max-width: 480px) {
      .header-title { font-size: 2.75rem; }
    }
  </style>
</head>
<body>

  <div id="splashScreen">
    <img src="./logo_chargement.png" alt="Maison Fleurie" class="splash-logo" />
    <div class="splash-loader"></div>
  </div>

  <header class="header" role="banner">
    <p class="header-eyebrow">Maison Fleurie · Montpellier</p>
    <h1 class="header-title">La Carte</h1>
    <div class="header-divider"></div>
    <p class="header-subtitle">Table des Mets &nbsp;·&nbsp; Cocktails &nbsp;·&nbsp; Vins</p>
    <button id="btnShare" class="share-btn" aria-label="Partager">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.02-4.11A3 3 0 1 0 15 4.91c0 .24.04.47.09.7L8.07 9.72A3 3 0 1 0 6 12.91c.82 0 1.56-.33 2.09-.87l7.02 4.11c-.05.21-.08.43-.08.66a3 3 0 1 0 3-3Z"/>
      </svg>
    </button>
  </header>

  <div id="stickySectionHeader" class="sticky-section-header"></div>

  <noscript><p style="text-align:center;padding:2rem;color:#f5f0e8">JavaScript requis.</p></noscript>

  <div class="search-container">
    <div class="search-row">
      <input id="searchBox" class="search-box" type="search" placeholder="Rechercher un plat, cocktail, vin…" autocomplete="off" />
      <button id="clearSearch" class="clear-btn" aria-label="Effacer">✕</button>
    </div>
    <div id="searchInfo" class="search-results-info" style="display:none"></div>
  </div>

  <main id="main" class="container" role="main">
    <nav class="tab-nav" role="tablist">
      <button class="tab-btn" role="tab" aria-selected="true"  data-tab="now">
        <span class="ico"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3l2 5 5 2-5 2-2 5-2-5-5-2 5-2z"/></svg></span><span>En ce moment</span>
      </button>
      <button class="tab-btn" role="tab" aria-selected="false" data-tab="deguster">
        <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M7 3v10M11 3v10M5 7h8M16 4h3v9a3 3 0 0 1-3 3h-3"/></svg></span><span>Déguster</span>
      </button>
      <button class="tab-btn" role="tab" aria-selected="false" data-tab="cocktails">
        <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 4h18l-7 7v7h-4v-7z"/></svg></span><span>Cocktails</span>
      </button>
      <button class="tab-btn" role="tab" aria-selected="false" data-tab="chaudes">
        <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 8h12a4 4 0 0 1 0 8H4z"/><path d="M7 4c0 2 2 2 2 4s-2 2-2 4"/></svg></span><span>Chaudes</span>
      </button>
      <button class="tab-btn" role="tab" aria-selected="false" data-tab="bieres">
        <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M7 8h8v12H7z"/><path d="M15 10h2a3 3 0 0 1 0 6h-2"/></svg></span><span>Bières</span>
      </button>

<script>
const SUPABASE_URL  = 'https://yctaoyxlfzmlzkwwjeti.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InljdGFveXhsZnptbHprd3dqZXRpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2MDQyNzAsImV4cCI6MjA4NzE4MDI3MH0.VeufqlzIrDobaOZRmz-xt2Zda-6QVz0T2CFy_GvIdPw';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

const CACHE_KEY = 'mf-menu-sb-v5';
const CACHE_AT  = 'mf-menu-sb-at5';
const CACHE_TTL = 15 * 60 * 1000;

let allMenuData = [], wineData = [];
let currentTab = 'now', isSearching = false, searchTimeout;
let wineTreeStep = 0, wineTreeSelections = {}, showingWineList = false;
let placeholderInterval;

const qs  = s => document.querySelector(s);
const qsa = s => Array.from(document.querySelectorAll(s));
const norm = (s='') => String(s).normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim();

const getPriceVal = (raw='') => {
  const m = String(raw).match(/(\d+(?:[.,]\d+)?)/g);
  if (!m) return Infinity;
  return Math.min(...m.map(n=>parseFloat(n.replace(',','.'))).filter(isFinite));
};
const byPrice = (a,b) => {
  const pa=getPriceVal(a.prix), pb=getPriceVal(b.prix);
  if (isFinite(pa)&&isFinite(pb)&&pa!==pb) return pa-pb;
  if (isFinite(pa)&&!isFinite(pb)) return -1;
  if (!isFinite(pa)&&isFinite(pb)) return 1;
  return (a.nom||'').localeCompare(b.nom||'','fr',{sensitivity:'base'});
};

/* ── WINE TREE ── */
const PROVENANCE_LOCAL = ['languedoc','occitanie','herault','pic','montpellier','gard','provence'];
const PROVENANCE_META = {
  local:      {label:'Sélection locale',    desc:'Vignerons du Languedoc & Occitanie.'},
  decouverte: {label:'Escapade & découverte',desc:'Autres régions & voyages gustatifs.'}
};
const SUBSTYLE_META = {
  fruite: {label:'Fruité',  desc:'Gourmand, notes de fruits blancs et jaunes.'},
  mineral:{label:'Minéral', desc:'Salinité, pierre à fusil, tension élégante.'},
  rond:   {label:'Rond',    desc:'Ampleur, notes beurrées et texture veloutée.'},
  orange: {label:'Orange',  desc:'Macération sur peaux, texture originale.'}
};
const SUBSTYLE_ORDER = ['fruite','mineral','rond','orange'];

const classifyProvenance = w => {
  const p = norm(w.tag_provenance||'');
  if (!p) return null;
  return PROVENANCE_LOCAL.some(k=>p.includes(k)) ? 'local' : 'decouverte';
};
const styleMatches = (w,v) => {
  const t=norm(w.tag_style||''); if(!t) return false;
  if(v==='nature')   return t.includes('nature')||t.includes('biodynam');
  if(v==='souple')   return t.includes('souple')||t.includes('fruit');
  if(v==='puissant') return t.includes('puissant')||t.includes('struct');
  if(v==='sec')      return t.includes('sec');
  if(v==='moelleux') return t.includes('moelleux')||t.includes('doux');
  return t===v;
};
const substyleMatches = (w,v) => norm(w.tag_sous_style||'').includes(v);
const isWineByGlass   = w => norm(w.section||'').includes('verre');

const buildProvenanceOptions = wines => {
  const seen=new Set(); wines.forEach(w=>{const g=classifyProvenance(w);if(g)seen.add(g);});
  return ['local','decouverte'].filter(g=>seen.has(g)).map(g=>({value:g,...PROVENANCE_META[g]}));
};
const buildSubstyleOptions = wines => {
  const seen=new Map();
  wines.forEach(w=>{const r=norm(w.tag_sous_style||'');if(!r||seen.has(r))return;seen.set(r,{value:r,...(SUBSTYLE_META[r]||{label:r,desc:''})});});
  return SUBSTYLE_ORDER.filter(k=>seen.has(k)).map(k=>seen.get(k));
};

const BASE_Q = {id:'color',tag:'tag_couleur',question:'Quelle couleur ?',options:[
  {value:'blanc',label:'Blanc',dotColor:'#E8D9B5',desc:'Secs, moelleux ou nature.'},
  {value:'rouge',label:'Rouge',dotColor:'#7B1F29',desc:'Souple, structuré ou nature.'}
]};
const WHITE_FLOW = [
  {id:'style',question:'Quel style de blanc ?',match:styleMatches,options:[
    {value:'sec',label:'Blanc sec',desc:'Vif, tendu ou minéral.'},
    {value:'moelleux',label:'Moelleux',desc:'Doux, gourmand & velouté.'},
    {value:'nature',label:'Biodynamie & nature',desc:'Sans artifice, vivant.'}
  ]},
  {id:'origin',question:"Envie d'une cuvée locale ?",options:(_,w)=>buildProvenanceOptions(w),show:s=>!!s.style,match:(w,v)=>classifyProvenance(w)===v},
  {id:'substyle',question:'Quel profil en blanc sec ?',options:(_,w)=>buildSubstyleOptions(w),show:s=>norm(s.style)==='sec',match:(w,v)=>substyleMatches(w,v)}
];
const RED_FLOW = [
  {id:'style',question:'Quel style de rouge ?',match:styleMatches,options:[
    {value:'souple',label:'Souple & fruité',desc:'Gamay, pinot, fraîcheur.'},
    {value:'puissant',label:'Puissant & structuré',desc:'Tanins fondus, épices.'},
    {value:'nature',label:'Biodynamie & nature',desc:'Jus libre, vibrants.'}
  ]},
  {id:'origin',question:'Plutôt local ou escapade ?',options:(_,w)=>buildProvenanceOptions(w),show:s=>!!s.style,match:(w,v)=>classifyProvenance(w)===v}
];

const getWineQuestions = () => {
  const c=norm(wineTreeSelections.color||'');
  const f=[BASE_Q];
  if(c==='blanc') f.push(...WHITE_FLOW);
  else if(c==='rouge') f.push(...RED_FLOW);
  return f.filter(q=>!q.show||q.show(wineTreeSelections));
};
const getEligible = (questions,idx) => {
  const prev=questions.slice(0,idx);
  return wineData.filter(w=>prev.every(q=>{
    const v=norm(wineTreeSelections[q.id]||''); if(!v)return true;
    if(typeof q.match==='function')return q.match(w,v);
    return norm(w[q.tag]||'')===v;
  }));
};
const getWinesByPath = sel => {
  const c=norm(sel.color||''),st=norm(sel.style||''),or=norm(sel.origin||''),ss=norm(sel.substyle||'');
  const flt=keys=>wineData.filter(w=>keys.every(k=>{
    if(k==='color')    return norm(w.tag_couleur||'')===c;
    if(k==='style')    return styleMatches(w,st);
    if(k==='origin')   return classifyProvenance(w)===or;
    if(k==='substyle') return substyleMatches(w,ss);
    return true;
  }));
  const req=['color','style','origin','substyle'].filter(k=>sel[k]);
  let fil=flt(req);
  for(const k of ['substyle','origin','style']){if(fil.length)break;const i=req.indexOf(k);if(i!==-1){req.splice(i,1);fil=flt(req);}}
  if(!fil.length&&c)fil=wineData.filter(w=>norm(w.tag_couleur||'')===c);
  if(!fil.length)fil=wineData.slice();
  return fil.map(w=>{
    let s=0;
    if(c&&norm(w.tag_couleur||'')===c)s+=12;
    if(st&&styleMatches(w,st))s+=8;
    if(or&&classifyProvenance(w)===or)s+=5;
    if(ss&&substyleMatches(w,ss))s+=4;
    if(isWineByGlass(w))s+=2;
    if(w.recommandation)s+=3;
    return {w,s};
  }).sort((a,b)=>b.s-a.s||byPrice(a.w,b.w)).slice(0,6).map(i=>i.w);
};

/* ── RENDER ── */
const DEGUSTER_ORDER=['veggie','terre','mer','fromages','charcuterie','dessert','desserts'];

const itemHTML = item=>`
  <div class="menu-item">
    <div class="item-info">
      <div class="item-name">${item.nom||''}</div>
      ${item.description?`<div class="item-description">${item.description}</div>`:''}
    </div>
    <div class="item-price">${item.prix||''}</div>
  </div>`;

const renderSections = (items,tab) => {
  const g=new Map();
  items.forEach(it=>{const k=it.section||'Autres';if(!g.has(k))g.set(k,[]);g.get(k).push(it);});
  return [...g.entries()].sort((a,b)=>{
    if(norm(tab)!=='deguster')return a[0].localeCompare(b[0],'fr');
    const ia=DEGUSTER_ORDER.findIndex(s=>norm(a[0]).includes(s));
    const ib=DEGUSTER_ORDER.findIndex(s=>norm(b[0]).includes(s));
    return (ia===-1?999:ia)-(ib===-1?999:ib);
  }).map(([sec,its])=>`<h2 class="section-title" data-section="${sec}">${sec}</h2>`+its.sort(byPrice).map(itemHTML).join('')).join('');
};

const showSkeleton = el => {
  el.innerHTML=`
    <div class="menu-item"><span class="skeleton big" style="width:55%"></span><span class="skeleton" style="width:60px"></span></div>
    <div class="menu-item"><span class="skeleton big" style="width:40%"></span><span class="skeleton" style="width:60px"></span></div>
    <div class="menu-item"><span class="skeleton big" style="width:65%"></span><span class="skeleton" style="width:60px"></span></div>`;
};

const renderNow = () => {
  const el=qs('#panel-now'); if(!el)return;
  if(!allMenuData.length){showSkeleton(el);return;}
  const now=allMenuData.filter(i=>i.en_ce_moment);
  if(!now.length){el.innerHTML=`<div class="empty-state"><h3>Aucune nouveauté</h3></div>`;return;}
  el.innerHTML=`<div class="now-header"><p class="now-eyebrow">Actuellement</p><h2 class="now-title">À l'affiche</h2></div>`+renderSections(now,'now');
};

const renderTab = tab => {
  if(tab==='now') {renderNow();return;}
  if(tab==='vins'){renderWineTree();return;}
  const el=qs(`#panel-${tab}`); if(!el)return;
  if(!allMenuData.length){showSkeleton(el);return;}
  const items=allMenuData.filter(i=>i.onglet===tab);
  if(!items.length){el.innerHTML=`<div class="empty-state"><h3>Section vide</h3></div>`;return;}
  el.innerHTML=renderSections(items,tab);
};

const renderWineTree = () => {
  const p=qs('#panel-vins'); if(!p)return;
  if(!wineData.length){showSkeleton(p);return;}
  if(showingWineList){renderWineList();return;}
  const qs2=getWineQuestions();
  if(wineTreeStep>=qs2.length){renderWineRecommendations();return;}
  const cq=qs2[wineTreeStep], el2=getEligible(qs2,wineTreeStep);
  let opts=typeof cq.options==='function'?cq.options(wineTreeSelections,el2):cq.options;
  opts=(opts||[]).filter(Boolean);
  if(!opts.length){delete wineTreeSelections[cq.id];wineTreeStep++;renderWineTree();return;}
  if(cq.autoAdvance!==false&&opts.length===1){wineTreeSelections[cq.id]=opts[0].value;wineTreeStep++;renderWineTree();return;}
  const qt=typeof cq.question==='function'?cq.question(wineTreeSelections,el2):cq.question;
  const tot=qs2.length, st=Math.min(wineTreeStep+1,tot);
  const oi=o=>o.dotColor?`<span class="wine-color-dot" style="--dot-color:${o.dotColor}"></span>`:'';
  p.innerHTML=`
    <div class="wine-tree">
      <div class="wine-tree-header"><p class="wine-tree-eyebrow">Guide Vins</p><h2 class="wine-tree-title">Quel vin ce soir ?</h2></div>
      <div class="progress-bar">${qs2.map((_,i)=>`<div class="progress-step ${i<=wineTreeStep?'active':''}"></div>`).join('')}</div>
      <p class="progress-info">Étape ${st} sur ${tot}</p>
      <h3 class="question-title">${qt}</h3>
      <div class="wine-options">${opts.map(o=>`
        <button class="wine-option" data-value="${o.value}">
          <div class="wine-option-content">
            <div class="wine-option-label">${oi(o)}${o.label}</div>
            ${o.desc?`<div class="wine-option-desc">${o.desc}</div>`:''}
          </div>
          <svg class="chevron-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        </button>`).join('')}</div>
      <div class="wine-nav-btns">
        ${wineTreeStep>0?`<button class="wine-btn wine-btn-back" id="wineBackBtn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>Retour</button>`:''}
        <button class="wine-btn wine-btn-secondary" id="showAllWinesBtn">Voir tous les vins</button>
      </div>
    </div>`;
  qsa('.wine-option').forEach(b=>{
    b.addEventListener('click',()=>{
      const v=b.dataset.value,pv=wineTreeSelections[cq.id];
      wineTreeSelections[cq.id]=v;
      if(cq.id==='color'&&v!==pv){delete wineTreeSelections.style;delete wineTreeSelections.origin;delete wineTreeSelections.substyle;}
      if(cq.id==='style'&&v!==pv){delete wineTreeSelections.origin;delete wineTreeSelections.substyle;}
      wineTreeStep++;renderWineTree();
    });
  });
  qs('#wineBackBtn')?.addEventListener('click',()=>{const pq=qs2[wineTreeStep-1];delete wineTreeSelections[pq.id];wineTreeStep--;renderWineTree();});
  qs('#showAllWinesBtn')?.addEventListener('click',()=>{showingWineList=true;renderWineList();});
};

const renderWineRecommendations = () => {
  const p=qs('#panel-vins'); if(!p)return;
  const recos=getWinesByPath(wineTreeSelections);
  const cards=recos.length?recos.map(w=>{
    const b=[];
    if(isWineByGlass(w))b.push('<span class="wine-badge wine-badge-glass">Au verre</span>');
    if(w.recommandation)b.push('<span class="wine-badge wine-badge-reco">Recommandé</span>');
    if(classifyProvenance(w)==='local')b.push('<span class="wine-badge wine-badge-local">Local</span>');
    const sn=norm(w.tag_style||'');
    let sl=sn==='sec'?(norm(w.tag_couleur||'')==='blanc'?'Blanc sec':'Sec')
      :sn==='moelleux'?'Moelleux':sn==='souple'?'Souple & fruité':sn==='puissant'?'Puissant & structuré':sn.includes('nature')?'Nature':'';
    const ssn=norm(w.tag_sous_style||'');
    const ssl=ssn?(SUBSTYLE_META[ssn]?.label||ssn):'';
    const prof=[sl,ssl].filter(Boolean).join(' · ');
    const d=w.description||'',pts=d.split(',');
    const reg=pts[0]?`<div class="wine-card-region">${pts[0]}</div>`:'';
    const gra=pts.slice(1).join(',').trim()?`<div class="wine-card-grapes">${pts.slice(1).join(',').trim()}</div>`:'';
    const prH=prof?`<div class="wine-card-grapes">${prof}</div>`:'';
    return `<div class="wine-card">${b.length?`<div class="wine-card-badges">${b.join('')}</div>`:''}<div class="wine-card-header"><div class="wine-card-name">${w.nom}</div><div class="wine-card-price">${w.prix||''}</div></div>${reg}${gra}${prH}</div>`;
  }).join(''):`<div class="empty-state"><h3>Aucun vin trouvé</h3><p>Essayez une autre combinaison.</p></div>`;
  p.innerHTML=`
    <div class="wine-recommendations">
      <div class="reco-header"><p class="reco-eyebrow">Notre sélection</p><h2 class="reco-title">Vos recommandations</h2></div>
      ${cards}
      <div class="wine-nav-btns">
        <button class="wine-btn wine-btn-back" id="wineBackFromReco"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>Retour</button>
        <button class="wine-btn wine-btn-back" id="wineReset">Nouvelle recherche</button>
        <button class="wine-btn wine-btn-secondary" id="showAllWinesBtn2">Tous les vins</button>
      </div>
    </div>`;
  qs('#wineBackFromReco')?.addEventListener('click',()=>{
    const q=getWineQuestions(),pq=q[Math.max(q.length-1,0)];
    if(pq){delete wineTreeSelections[pq.id];wineTreeStep=Math.max(q.length-1,0);}
    else{wineTreeSelections={};wineTreeStep=0;}
    showingWineList=false;renderWineTree();
  });
  qs('#wineReset')?.addEventListener('click',()=>{wineTreeStep=0;wineTreeSelections={};showingWineList=false;renderWineTree();});
  qs('#showAllWinesBtn2')?.addEventListener('click',()=>{showingWineList=true;renderWineList();});
};

const renderWineList = () => {
  const p=qs('#panel-vins'); if(!p)return;
  const g=new Map();
  wineData.forEach(w=>{const k=w.section||'Autres';if(!g.has(k))g.set(k,[]);g.get(k).push(w);});
  let html='';
  for(const[sec,ws]of g){html+=`<h2 class="section-title" data-section="${sec}">${sec}</h2>`;ws.sort(byPrice).forEach(w=>{html+=itemHTML(w);});}
  p.innerHTML=html+`<div class="wine-nav-btns" style="margin-top:2rem"><button class="wine-btn wine-btn-primary" id="backToTreeBtn">Guide de sélection</button></div>`;
  qs('#backToTreeBtn')?.addEventListener('click',()=>{showingWineList=false;wineTreeStep=0;wineTreeSelections={};renderWineTree();});
};

/* ── DATA ── */
const loadCache = () => {
  try{const at=Number(localStorage.getItem(CACHE_AT)||0);if(Date.now()-at<CACHE_TTL){const c=JSON.parse(localStorage.getItem(CACHE_KEY)||'[]');if(Array.isArray(c)&&c.length)return c;}}catch{}return null;
};
const saveCache = rows => { try{localStorage.setItem(CACHE_KEY,JSON.stringify(rows));localStorage.setItem(CACHE_AT,String(Date.now()));}catch{} };

const setData = rows => {
  allMenuData = rows.filter(i=>i.actif);
  wineData    = allMenuData.filter(i=>i.onglet==='vins');
  /* Render APRÈS que les données sont en place */
  ['now','deguster','cocktails','chaudes','bieres','softs'].forEach(t=>renderTab(t));
  renderWineTree();
  startPlaceholder();
  hideSplash();
};

const fetchData = async () => {
  /* Skeletons immédiats */
  ['now','deguster','cocktails','chaudes','bieres','softs','vins'].forEach(t=>{const el=qs(`#panel-${t}`);if(el)showSkeleton(el);});
  const cached=loadCache();
  if(cached){setData(cached);return;}
  try{
    const{data,error}=await sb.from('menu_items').select('*').eq('actif',true).order('sort_order',{ascending:true});
    if(error)throw error;
    saveCache(data);setData(data);
  }catch(e){console.error(e);qs('#errorContainer').style.display='block';}
};

/* ── TABS ── */
const setActiveTab = tab => {
  currentTab=tab;
  qsa('.tab-btn').forEach(b=>b.setAttribute('aria-selected',b.dataset.tab===tab?'true':'false'));
  qsa('.tab-content').forEach(p=>p.classList.remove('active'));
  qs(`#panel-${tab}`)?.classList.add('active');
  if(!isSearching)renderTab(tab);
};

/* ── SEARCH ── */
const performSearch = query => {
  isSearching=true;
  const q=norm(query);
  const res=allMenuData.filter(i=>norm(i.nom).includes(q)||norm(i.description||'').includes(q)||norm(i.section||'').includes(q));
  const info=qs('#searchInfo');info.style.display='block';info.textContent=`${res.length} résultat(s) pour "${query}"`;
  const ap=qs('.tab-content.active'); if(!ap)return;
  if(!res.length){ap.innerHTML=`<div class="empty-state"><h3>Aucun résultat</h3></div>`;return;}
  ap.innerHTML=renderSections(res,currentTab);
};
const clearSearch = () => {
  isSearching=false;qs('#searchBox').value='';qs('#searchInfo').style.display='none';renderTab(currentTab);
};

/* ── SCROLL ── */
const setupScroll = () => {
  const sh=qs('#stickySectionHeader'),bt=qs('#backToTop');
  bt?.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));
  window.addEventListener('scroll',()=>{
    if(window.scrollY>300)bt?.classList.add('visible');else bt?.classList.remove('visible');
    const ap=qs('.tab-content.active'); if(!ap||!sh)return;
    let cur=null;
    ap.querySelectorAll('.section-title').forEach(t=>{if(t.getBoundingClientRect().top<=80)cur=t.dataset.section||t.textContent;});
    if(cur){sh.textContent=cur;sh.classList.add('visible');}else sh.classList.remove('visible');
  },{passive:true});
};

/* ── SPLASH — délai minimum 200ms ── */
window._splashStart=Date.now();
let _splashHidden=false;
const hideSplash = () => {
  if(_splashHidden)return; _splashHidden=true;
  const s=qs('#splashScreen');
  const delay=Math.max(0,200-(Date.now()-window._splashStart));
  setTimeout(()=>{s?.classList.add('fade-out');setTimeout(()=>{if(s)s.style.display='none';},500);},delay);
};
window.addEventListener('load',()=>setTimeout(hideSplash,800));

/* ── PLACEHOLDER ── */
const startPlaceholder = () => {
  const box=qs('#searchBox'); if(!box)return;
  const up=()=>{const n=allMenuData.filter(i=>i.en_ce_moment);if(n.length){const p=n[Math.floor(Math.random()*n.length)];box.placeholder=`Rechercher… (ex: ${p.nom})`;} };
  up(); placeholderInterval=setInterval(up,5000);
};

/* ── INIT ── */
document.addEventListener('DOMContentLoaded',()=>{
  qsa('.tab-btn').forEach(b=>{
    b.addEventListener('click',e=>{e.preventDefault();setActiveTab(b.dataset.tab);});
    b.addEventListener('keydown',e=>{
      const tabs=qsa('.tab-btn'),idx=tabs.findIndex(t=>t.getAttribute('aria-selected')==='true');
      if(e.key==='ArrowRight'){e.preventDefault();const n=tabs[(idx+1)%tabs.length];n.focus();setActiveTab(n.dataset.tab);}
      if(e.key==='ArrowLeft') {e.preventDefault();const n=tabs[(idx-1+tabs.length)%tabs.length];n.focus();setActiveTab(n.dataset.tab);}
    });
  });
  const sb2=qs('#searchBox'),cb=qs('#clearSearch');
  sb2.addEventListener('focus',()=>cb.classList.add('visible'));
  sb2.addEventListener('blur', ()=>{setTimeout(()=>{if(!sb2.value.trim())cb.classList.remove('visible');},200);});
  sb2.addEventListener('input',e=>{
    clearTimeout(searchTimeout);const q=e.target.value.trim();
    if(q)cb.classList.add('visible');
    if(!q){clearSearch();cb.classList.remove('visible');return;}
    searchTimeout=setTimeout(()=>performSearch(q),250);
  });
  cb.addEventListener('click',()=>{clearSearch();cb.classList.remove('visible');sb2.blur();});
  qs('#retryBtn')?.addEventListener('click',fetchData);
  qs('#btnShare')?.addEventListener('click',async()=>{
    const url=location.href;
    if(navigator.share)try{await navigator.share({title:document.title,url});}catch{}
    else try{await navigator.clipboard.writeText(url);}catch{}
  });
  setupScroll();
  fetchData();
});
</script>
</body>
</html>
